title: Lamb Ragu with Artichokes
source: NYT Cooking
tags:
  - meal
description: A quick and easy take on a traditional ragu.
ingredients:
  - qnty: 3/4 lb
    name: pasta
    note: fettuccine, or other long, wide noodle
  - qnty: 1 lb
    name: lamb
    note: ground
  - qnty: 2 tbsp
    name: tomato paste
  - qnty: 3 cloves
    name: garlic
    note: minced
  - name: red pepper flakes
  - qnty: 1/2 cup
    name: white wine
    note: dry
  - qnty: 2 pints
    name: cherry tomatoes
    note: halved
  - qnty: 1 can
    name: artichokes
    note: drained, quartered
  - qnty: 2 tbsp
    name: butter
  - name: basil
    note: fresh, whole leaves
  - name: salt
  - name: olive oil
instructions:
  - Cook pasta. Reserve some pasta water and drain.
  - Meanwhile, in a large dutch oven, brown the ground lamb. Season with salt,
    and add tomato paste, garlic, and red pepper flakes to taste. Cook until
    tomato paste is a shade darker and lamb is cooked through. Deglaze with the
    wine and stir, reducing for a couple minutes.
  - Add the cherry tomatoes and cook until softened, a couple minutes. Add
    pasta water and artichokes, scraping any browned bits from the bottom of
    the pan. Salt to taste.
  - Add pasta and butter to the dutch oven and toss to coat. 
  - Garnish with fresh basil leaves, a drizzle of olive oil, and serve.
notes:
  - If you don't have wine, water can be used in a pinch.
yield: 3-4 servings
