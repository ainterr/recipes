title: Hollandaise
source: J Kenji Lopez-Alt
tags:
  - sauce
description: The notorious sauce made easy with an immersion blender.
ingredients:
  - qnty: 2 large
    name: egg yolks
  - qnty: 1 tsp
    name: water
  - qnty: 1 tsp
    name: lemon juice
  - qnty: 1/2 cup
    name: butter
  - qnty: pinch
    name: cayenne pepper
instructions:
  - Combine egg yolks, water, lemon juice, and salt in a cup just wide enough
    for the head of an immersion blender. Melt butter and transfer to a small
    cup from which to pour.
  - Start blending the egg mixture and slowly stream in the melted butter,
    blending continuously.
  - Season to taste with salt and, optionally, a pinch of cayenne.
notes:
  - Serve immediately or transfer to a small pot and keep warm. Hollandaise
    cannot be cooled and reheated.
