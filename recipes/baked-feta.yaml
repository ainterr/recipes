title: Baked Feta
source: NYT Cooking
tags:
  - snack
description: A rich baked cheese dip.
ingredients:
  - qnty: 8 oz
    name: feta
    note: one block
  - name: olive oil
  - name: honey
instructions:
  - Preheat oven to 400°F.
  - Place feta in a small, oven-safe dish and cover with olive oil. Bake until
    soft, about 8 minutes.
  - Set the oven to broil. Spread a small amount of honey on top of the warm
    feta and broil until nicely browned.
notes:
  - Serve with pita slices or crusty bread. Optinally, add sliced tomatoes,
    roasted beets, and/or pickled vegetables.
